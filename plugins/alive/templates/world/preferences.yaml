# ALIVE Preferences
# How the squirrel behaves. Toggles default ON — set to false to disable.
# Session-start hook reads this file on boot.

# ─── SQUIRREL ────────────────────────────────────────────────────
# squirrel_name: null           # Custom name for this world's squirrel
# spark: true                   # The Spark observation at walnut open
# show_reads: true              # Show ▸ indicators when loading files
# stash_checkpoint: true        # Shadow-write stash to squirrel YAML every 5 items / 20 min
# always_watching: true         # Background instincts: people, working fits, capturable content
# save_prompt: true             # Ask "anything else?" before save

# ─── WORLD BEHAVIOUR ─────────────────────────────────────────────
# health_nudges: true           # Surface stale walnut warnings proactively

# ─── PERMISSIONS ──────────────────────────────────────────────────
# permissions:
#   auto_create_walnuts: false   # Create walnuts without asking
#   auto_route_people: true      # Route people context automatically
#   auto_archive: false          # Archive walnuts without asking

# ─── ACTION LOGGING ──────────────────────────────────────────────
# action_logging: true           # Log squirrel actions to squirrel YAML

# ─── SHARING ─────────────────────────────────────────────────────
# sharing_nudge: true            # Nudge when bundles reach publishable state

# ─── DISPLAY ─────────────────────────────────────────────────────
# theme: vibrant                # vibrant | minimal | clean (companion app)

# ─── DISCOVERY HINTS ─────────────────────────────────────────────
# First-time-user hints shown in interactive commands.
# discovery_hints: true           # auto-retires after first successful operation

# ─── P2P SHARING ─────────────────────────────────────────────────
# ALIVE P2P is opt-in. These settings control share/receive/relay behaviour.
# Discovery hints use the top-level `discovery_hints:` key (above).
#
# p2p:
#   share_presets:
#     internal:
#       exclude_patterns:
#         - "**/observations.md"
#     external:
#       exclude_patterns:
#         - "**/pricing*"
#         - "**/invoice*"
#         - "**/salary*"
#         - "**/strategy*"
#         - "**/observations.md"
#   relay:
#     url: null                   # GitHub repo URL for relay
#     token_env: GH_TOKEN         # env var for GitHub token
#   auto_receive: false           # Auto-import .walnut in 03_Inbox
#   signing_key_path: "~/.alive/relay/keys/private.pem"
#   require_signature: false      # Refuse unsigned packages on receive

# ─── VOICE ───────────────────────────────────────────────────────
# World-level voice defaults. Walnut-level config in _kernel/config.yaml overrides.
#
# voice:
#   character: [direct, warm, technical]
#   blend: 70% sage, 30% rebel
#   never_say: []

# ─── CONTEXT SOURCES ─────────────────────────────────────────────
# External context the system knows about. Used by alive:world (dashboard),
# alive:session-history (search), alive:search-world (query), and alive:capture-context (import).
#
# Each source has a type and optional sync method. Types:
#   mcp_live        → live API via MCP server (reads on demand)
#   sync_script     → pulled by a script on a schedule or manually
#   static_export   → one-time export file (ChatGPT, Claude Desktop, etc.)
#   markdown_vault  → existing markdown folder (Obsidian, etc.)
#
# context_sources:
#   gmail:
#     type: mcp_live
#     status: active
#     walnuts: all
#   slack:
#     type: sync_script
#     script: .claude/scripts/slack-sync.mjs
#     status: active
#     walnuts: all
#   chatgpt:
#     type: static_export
#     path: ~/exports/chatgpt/conversations.json
#     status: indexed
#     walnuts: all
#   github:
#     type: mcp_live
#     status: active
#     walnuts: all
#
# Scoping:
#   walnuts: all          → available to every walnut
#   walnuts: [nova, gtm]  → only when working in these walnuts
#
# Status:
#   active    → live, queried on demand
#   indexed   → imported and searchable
#   available → registered but not yet imported
